apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  admin-user: "admin"
---
{{- if .Values.grafanaAdminPasswordSsmParameter }}
# Patches the "admin-password" key into the grafana-admin Secret above.
# creationPolicy: Merge only adds/updates this one key — it never owns or
# deletes the Secret, so it can't race the plain Secret manifest above it.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-password
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: grafana-admin
    creationPolicy: Merge
  data:
    - secretKey: admin-password
      remoteRef:
        key: {{ .Values.grafanaAdminPasswordSsmParameter | quote }}
{{- end }}

{{- if .Values.grafanaOidcClientSecretSsmParameter }}
# Sourced by grafana.envValueFrom (see values.yaml) as
# GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET. Same shared RHBK client secret used by
# every other OIDC-backed devtool on this platform (argocd, sonarqube, etc.)
# — see clusters-provision/clusters/rhbk/values.yaml's
# sharedClientSecretSsmParameter.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc-client-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: grafana-oidc-client-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: {{ .Values.grafanaOidcClientSecretSsmParameter | quote }}
{{- end }}

# Base values — env-invariant defaults. Ingress host, storage class, and the
# admin password SSM path are set in clusters-definition.
#
# Brings Prometheus + kube-state-metrics + node-exporter + Grafana onto the
# cluster so Grafana actually has metrics to show (this cluster previously
# had no metrics-server or Prometheus at all — `kubectl top` failed with
# "Metrics API not available"). Alertmanager is disabled: nothing on this
# platform sends alert notifications (no Slack/email/webhook configured), so
# running it would just be inert overhead.
kube-prometheus-stack:
  alertmanager:
    enabled: false

  kubeStateMetrics:
    enabled: true
  nodeExporter:
    enabled: true

  prometheus:
    prometheusSpec:
      # Single-node local-disk cluster — keep retention and storage modest.
      retention: 7d
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  grafana:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi

    persistence:
      enabled: true
      storageClassName: gp3
      size: 2Gi

    # Reuses this platform's shared admin password Secret (see
    # templates/grafana-admin-secret.yaml) instead of the chart's own
    # randomly-generated one — same convention as every devtool's admin
    # login on this platform.
    admin:
      existingSecret: "grafana-admin"
      userKey: admin-user
      passwordKey: admin-password

    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "false"
      # hosts set in clusters-definition
      #
      # auth.generic_oauth (RHBK SSO) is entirely environment-specific — see
      # clusters-definition/clusters/kube-prometheus-stack/values.yaml's
      # grafana.ini + envValueFrom, same split as ArgoCD's oidc.config. Left
      # out here so a bare-provision deploy never references the
      # grafana-oidc-client-secret Secret before it exists (that Secret's
      # own ExternalSecret, in templates/grafana-oidc-secret.yaml, is
      # conditional on grafanaOidcClientSecretSsmParameter being set below).

# SSM Parameter Store path (SecureString) holding the shared admin password
# (same /devtools/admin/password used by every devtool on this platform) —
# patched into the grafana-admin Secret via an ExternalSecret. Requires the
# external-secrets-operator cluster-infra tool. Set in clusters-definition.
grafanaAdminPasswordSsmParameter: ""

# SSM Parameter Store path (SecureString) holding the RHBK-issued shared OIDC
# client secret (same value as argocd/sonarqube/jira/confluence/bitbucket —
# see clusters-provision/clusters/rhbk/values.yaml's
# sharedClientSecretSsmParameter) — synced into the grafana-oidc-client-secret
# Secret's client-secret key by templates/grafana-oidc-secret.yaml via an
# ExternalSecret. Requires both external-secrets-operator and rhbk. Set in
# clusters-definition.
grafanaOidcClientSecretSsmParameter: ""

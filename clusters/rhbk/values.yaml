# Values that are the same across every environment.
# RDS connection, LDAP/AD connection, hostnames, and secrets are
# environment-specific — see clusters-definition/clusters/rhbk/values.yaml.
#
# Note on RHBK vs upstream Keycloak: the actual Red Hat Build of Keycloak
# container image lives on registry.redhat.io and requires a Red Hat
# subscription this lab account doesn't have. The Operator, CRDs, and image
# used here are the upstream keycloak.org project RHBK is downstream of —
# same API (k8s.keycloak.org/v2alpha1), same Operator code. Swap
# `keycloakImage` below to the registry.redhat.io RHBK image (plus an
# ImagePullSecret) if a subscription is ever added — nothing else changes.

operatorImage: "quay.io/keycloak/keycloak-operator:26.6.4"
keycloakImage: "quay.io/keycloak/keycloak:26.6.4"

operator:
  resources:
    requests:
      cpu: 300m
      memory: 450Mi
    limits:
      cpu: 700m
      memory: 450Mi

instances: 1

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: 750m
    memory: 1536Mi

# Ingress for the Keycloak Service, routed through ingress-nginx + cloudflared
# like every other devtool. TLS terminates at Cloudflare.
ingress:
  host: "" # rhbk.devopstashtiot.page — set per environment
  className: nginx

# Postgres — reuse the shared devtools-rds instance (see devtools-labs
# terraform/live/devtools/rds). rdsAdmin credentials provision this chart's
# own low-privilege role/database via an initContainer on the Keycloak pod
# (spec.unsupported.podTemplate) — see templates/keycloak.yaml.
rds:
  host: "" # set per environment
  port: 5432
  database: rhbk

rdsAdmin:
  usernameSsmParameter: "" # set per environment
  passwordSsmParameter: "" # set per environment

# Low-privilege app role this chart's own initContainer creates on the shared
# RDS instance — matches the bitbucket/confluence pattern (fixed lab-shared
# credentials, not per-tool secrets).
dbSecrets:
  username: "rhbk_app"
  password: "123456"

# Keycloak's own bootstrap admin user — reuses the platform-wide shared
# admin password convention (see devtools-provision/devtools/argocd).
adminPasswordSsmParameter: "" # set per environment
adminUsername: "admin"

# Realm + LDAP user federation (Active Directory) + the ArgoCD OIDC client.
# All environment-specific — the domain controller's address/DN/bind
# credentials don't exist until devtools-labs' domain-controller unit is
# applied.
realm:
  name: devtools

# The domain controller's LDAP connection URL and bind service account
# (sAMAccountName + password) devtools-labs/terraform/modules/domain-controller
# publishes to SSM — never literal values in git (the private IP changes if
# the instance is ever replaced, and the bind password is a real secret).
# None of these can be wired into the KeycloakRealmImport CR (realm-import.yaml)
# directly from a Secret reference — same limitation as
# argocdClient.secretSsmParameter below — so realm-import.yaml creates the
# LDAP federation provider with placeholders and
# templates/set-ldap-credentials-job.yaml overwrites them via the Admin REST
# API. See that Job's header comment for the full flow.
ldap:
  connectionUrlSsmParameter: "" # set per environment
  usersDn: "" # OU=devops-tashtiot,DC=devtools,DC=local — set per environment

ldapBind:
  usernameSsmParameter: "" # set per environment
  passwordSsmParameter: "" # set per environment

argocdClient:
  clientId: "argocd"
  redirectUri: "" # https://argocd.devopstashtiot.page/auth/callback — set per environment
  # No secret set here — the KeycloakRealmImport CR (realm-import.yaml) omits
  # it deliberately, since Keycloak's realm-import JSON has no mechanism to
  # pull a client secret from a Secret reference and this value must never be
  # committed to git in plaintext. Keycloak assigns a random secret to the
  # client on creation; templates/set-client-secrets-job.yaml then overwrites
  # it via the Admin REST API with the real value pulled from SSM by
  # ExternalSecret. See sharedClientSecretSsmParameter below (set per
  # environment) and that Job template's header comment for the full flow.

sonarqubeClient:
  clientId: "sonarqube"
  redirectUri: "" # https://sonarqube.devopstashtiot.page/oauth2/callback/oidc — set per environment

# Grafana (kube-prometheus-stack cluster-infra tool) — gets the "groups"
# optionalClientScope like argocd/sonarqube, since Grafana's own
# auth.generic_oauth role_attribute_path (set in
# clusters-definition/clusters/kube-prometheus-stack/values.yaml) maps the
# devops-tashtiot AD group (and the svc-devops-tashtiot user specifically) to
# the Admin org role.
grafanaClient:
  clientId: "grafana"
  redirectUri: "" # https://grafana.devopstashtiot.page/login/generic_oauth — set per environment

# Jira/Confluence/Bitbucket clients — unlike argocdClient/sonarqubeClient's
# "groups" optionalClientScope, these deliberately get none: each of these
# three apps will be configured with its own LDAP user directory (against
# the same AD the ldap/ldapBind values above point at) for authorization/
# group membership, so there's no need for Keycloak to also carry group
# membership as a token claim for them. The client itself exists purely for
# OIDC login.
jiraClient:
  clientId: "jira"
  redirectUri: "" # https://jira.devopstashtiot.page/plugins/servlet/oauth/callback — set per environment

confluenceClient:
  clientId: "confluence"
  redirectUri: "" # https://confluence.devopstashtiot.page/plugins/servlet/oauth/callback — set per environment

bitbucketClient:
  clientId: "bitbucket"
  redirectUri: "" # https://bitbucket.devopstashtiot.page/plugins/servlet/oauth/callback — set per environment

# One shared OIDC client secret for ALL SIX clients above (argocd,
# sonarqube, grafana, jira, confluence, bitbucket) — a single SSM parameter and a
# single Job (templates/set-client-secrets-job.yaml) that sets the same
# value on every client via the Admin REST API, rather than a distinct
# secretSsmParameter + ExternalSecret + Job per client. Each app's own Helm
# chart (devtools-provision/devtools/<tool>) reads this exact same SSM
# parameter to configure its side of the OIDC client — one source of truth,
# no manual sync needed, same convention as adminPasswordSsmParameter/
# dbSecrets already being shared platform-wide.
sharedClientSecretSsmParameter: "/devtools/rhbk/oidc-client-secret"

# Creates the "groups" client scope + protocol mapper, the "sonarqube"/
# "grafana"/"jira"/"confluence"/"bitbucket" clients, and the "groups"
# optional-client-scope association on the argocd/sonarqube/grafana clients
# only — all via the Keycloak Admin REST API, idempotently. Jira/Confluence/
# Bitbucket deliberately do NOT get the groups scope association: those apps
# use their own LDAP user directory for authorization, not a Keycloak
# group-membership claim (see jiraClient's comment in values.yaml).
#
# realm-import.yaml ALSO declares these (clientScopes, the sonarqube/jira/
# confluence/bitbucket clients, optionalClientScopes on argocd/sonarqube),
# but that only takes effect on a genuinely fresh realm. Keycloak's
# KeycloakRealmImport does a one-shot `--import-realm` file import; its own
# log output on an already-bootstrapped realm is literally "Realm 'devtools'
# already exists. Import skipped" — it never re-applies changes to an
# existing realm's clients/scopes, no matter what the CR spec says (confirmed
# live: after adding the sonarqube client to realm-import.yaml and
# re-triggering the import Job, the client still didn't exist). So this Job
# is what actually keeps these in sync going forward, the same reason
# set-ldap-credentials-job.yaml/set-client-secret-job.yaml exist instead of
# relying on the CR alone. realm-import.yaml's declarations stay too, since
# they DO work for a from-scratch bootstrap (e.g. after a full
# teardown/recreate).
#
# For an already-existing client, redirectUris is explicitly re-applied on
# every run (not just left alone once created) — confirmed live that a
# stale redirectUri silently breaks login with Keycloak's "Invalid
# parameter: redirect_uri" and nothing else in this Job's create-only-if-
# missing logic would ever fix a values.yaml correction post-bootstrap.
#
# hook-weight -1 so this runs before set-client-secrets-job.yaml (default
# weight 0) — that Job wait-loops for each client to exist, but there's no
# reason to make it burn through retries when this can just run first.
{{- if .Values.sonarqubeClient.clientId }}
apiVersion: batch/v1
kind: Job
metadata:
  name: rhbk-provision-oidc-clients
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: provision-oidc-clients
          image: {{ .Values.keycloakImage | quote }}
          env:
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: rhbk-admin
                  key: username
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rhbk-admin
                  key: password
            - name: REALM
              value: {{ .Values.realm.name | quote }}
            - name: ARGOCD_CLIENT_ID
              value: {{ .Values.argocdClient.clientId | quote }}
            - name: SONARQUBE_CLIENT_ID
              value: {{ .Values.sonarqubeClient.clientId | quote }}
            - name: SONARQUBE_REDIRECT_URI
              value: {{ .Values.sonarqubeClient.redirectUri | quote }}
            - name: GRAFANA_CLIENT_ID
              value: {{ .Values.grafanaClient.clientId | quote }}
            - name: GRAFANA_REDIRECT_URI
              value: {{ .Values.grafanaClient.redirectUri | quote }}
            - name: JIRA_CLIENT_ID
              value: {{ .Values.jiraClient.clientId | quote }}
            - name: JIRA_REDIRECT_URI
              value: {{ .Values.jiraClient.redirectUri | quote }}
            - name: CONFLUENCE_CLIENT_ID
              value: {{ .Values.confluenceClient.clientId | quote }}
            - name: CONFLUENCE_REDIRECT_URI
              value: {{ .Values.confluenceClient.redirectUri | quote }}
            - name: BITBUCKET_CLIENT_ID
              value: {{ .Values.bitbucketClient.clientId | quote }}
            - name: BITBUCKET_REDIRECT_URI
              value: {{ .Values.bitbucketClient.redirectUri | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              KCADM=/opt/keycloak/bin/kcadm.sh
              SERVER="http://rhbk-service:8080"

              echo "Waiting for realm '$REALM' to exist..."
              for i in $(seq 1 60); do
                if "$KCADM" config credentials --server "$SERVER" --realm master \
                     --user "$KC_ADMIN_USER" --password "$KC_ADMIN_PASSWORD" >/dev/null 2>&1; then
                  "$KCADM" get "realms/$REALM" >/dev/null 2>&1 && break
                fi
                echo "  not ready yet, retrying in 5s"
                sleep 5
              done

              echo "Ensuring 'groups' client scope exists..."
              # kcadm's -q filter is NOT honored by the client-scopes GET
              # endpoint (confirmed live: -q name=groups returns every
              # client-scope in the realm, unfiltered) - unlike clients
              # (?clientId=) and components (?name=) elsewhere in this repo's
              # jobs, which DO filter correctly. Fetch id+name and filter
              # locally instead; relying on -q here silently grabbed
              # whichever scope happened to be last in the unfiltered
              # response (e.g. "profile") and associated THAT with argocd/
              # sonarqube instead of "groups". grep+cut, not awk: the
              # keycloak image doesn't have awk installed (confirmed live:
              # "awk: command not found"), only coreutils/grep.
              GROUPS_SCOPE_ID=$("$KCADM" get client-scopes -r "$REALM" --fields id,name --format csv --noquotes 2>/dev/null | grep ",groups$" | cut -d, -f1 | tail -1 || true)
              if [ -z "$GROUPS_SCOPE_ID" ]; then
                "$KCADM" create client-scopes -r "$REALM" \
                  -s name=groups -s protocol=openid-connect \
                  -s 'attributes."include.in.token.scope"=true'
                GROUPS_SCOPE_ID=$("$KCADM" get client-scopes -r "$REALM" --fields id,name --format csv --noquotes | grep ",groups$" | cut -d, -f1 | tail -1)
                "$KCADM" create "client-scopes/$GROUPS_SCOPE_ID/protocol-mappers/models" -r "$REALM" \
                  -s name=groups -s protocol=openid-connect -s protocolMapper=oidc-group-membership-mapper \
                  -s 'config."claim.name"=groups' \
                  -s 'config."full.path"=false' \
                  -s 'config."id.token.claim"=true' \
                  -s 'config."access.token.claim"=true' \
                  -s 'config."userinfo.token.claim"=true'
                echo "  created."
              else
                echo "  already exists ($GROUPS_SCOPE_ID)."
              fi

              echo "Ensuring '$SONARQUBE_CLIENT_ID' client exists..."
              SONARQUBE_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$SONARQUBE_CLIENT_ID" --fields id --format csv --noquotes 2>/dev/null | tail -1 || true)
              if [ -z "$SONARQUBE_UUID" ]; then
                "$KCADM" create clients -r "$REALM" \
                  -s clientId="$SONARQUBE_CLIENT_ID" -s name=SonarQube -s enabled=true \
                  -s protocol=openid-connect -s publicClient=false \
                  -s standardFlowEnabled=true -s directAccessGrantsEnabled=false \
                  -s 'redirectUris=["'"$SONARQUBE_REDIRECT_URI"'"]' \
                  -s 'webOrigins=["+"]'
                SONARQUBE_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$SONARQUBE_CLIENT_ID" --fields id --format csv --noquotes | tail -1)
                echo "  created ($SONARQUBE_UUID)."
              else
                "$KCADM" update "clients/$SONARQUBE_UUID" -r "$REALM" \
                  -s 'redirectUris=["'"$SONARQUBE_REDIRECT_URI"'"]'
                echo "  already exists ($SONARQUBE_UUID), redirectUris refreshed."
              fi

              echo "Ensuring '$GRAFANA_CLIENT_ID' client exists..."
              GRAFANA_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$GRAFANA_CLIENT_ID" --fields id --format csv --noquotes 2>/dev/null | tail -1 || true)
              if [ -z "$GRAFANA_UUID" ]; then
                "$KCADM" create clients -r "$REALM" \
                  -s clientId="$GRAFANA_CLIENT_ID" -s name=Grafana -s enabled=true \
                  -s protocol=openid-connect -s publicClient=false \
                  -s standardFlowEnabled=true -s directAccessGrantsEnabled=false \
                  -s 'redirectUris=["'"$GRAFANA_REDIRECT_URI"'"]' \
                  -s 'webOrigins=["+"]'
                GRAFANA_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$GRAFANA_CLIENT_ID" --fields id --format csv --noquotes | tail -1)
                echo "  created ($GRAFANA_UUID)."
              else
                "$KCADM" update "clients/$GRAFANA_UUID" -r "$REALM" \
                  -s 'redirectUris=["'"$GRAFANA_REDIRECT_URI"'"]'
                echo "  already exists ($GRAFANA_UUID), redirectUris refreshed."
              fi

              echo "Ensuring '$JIRA_CLIENT_ID' client exists..."
              JIRA_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$JIRA_CLIENT_ID" --fields id --format csv --noquotes 2>/dev/null | tail -1 || true)
              if [ -z "$JIRA_UUID" ]; then
                "$KCADM" create clients -r "$REALM" \
                  -s clientId="$JIRA_CLIENT_ID" -s name=Jira -s enabled=true \
                  -s protocol=openid-connect -s publicClient=false \
                  -s standardFlowEnabled=true -s directAccessGrantsEnabled=false \
                  -s 'redirectUris=["'"$JIRA_REDIRECT_URI"'"]' \
                  -s 'webOrigins=["+"]'
                JIRA_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$JIRA_CLIENT_ID" --fields id --format csv --noquotes | tail -1)
                echo "  created ($JIRA_UUID)."
              else
                "$KCADM" update "clients/$JIRA_UUID" -r "$REALM" \
                  -s 'redirectUris=["'"$JIRA_REDIRECT_URI"'"]'
                echo "  already exists ($JIRA_UUID), redirectUris refreshed."
              fi

              echo "Ensuring '$CONFLUENCE_CLIENT_ID' client exists..."
              CONFLUENCE_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CONFLUENCE_CLIENT_ID" --fields id --format csv --noquotes 2>/dev/null | tail -1 || true)
              if [ -z "$CONFLUENCE_UUID" ]; then
                "$KCADM" create clients -r "$REALM" \
                  -s clientId="$CONFLUENCE_CLIENT_ID" -s name=Confluence -s enabled=true \
                  -s protocol=openid-connect -s publicClient=false \
                  -s standardFlowEnabled=true -s directAccessGrantsEnabled=false \
                  -s 'redirectUris=["'"$CONFLUENCE_REDIRECT_URI"'"]' \
                  -s 'webOrigins=["+"]'
                CONFLUENCE_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CONFLUENCE_CLIENT_ID" --fields id --format csv --noquotes | tail -1)
                echo "  created ($CONFLUENCE_UUID)."
              else
                "$KCADM" update "clients/$CONFLUENCE_UUID" -r "$REALM" \
                  -s 'redirectUris=["'"$CONFLUENCE_REDIRECT_URI"'"]'
                echo "  already exists ($CONFLUENCE_UUID), redirectUris refreshed."
              fi

              echo "Ensuring '$BITBUCKET_CLIENT_ID' client exists..."
              BITBUCKET_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$BITBUCKET_CLIENT_ID" --fields id --format csv --noquotes 2>/dev/null | tail -1 || true)
              if [ -z "$BITBUCKET_UUID" ]; then
                "$KCADM" create clients -r "$REALM" \
                  -s clientId="$BITBUCKET_CLIENT_ID" -s name=Bitbucket -s enabled=true \
                  -s protocol=openid-connect -s publicClient=false \
                  -s standardFlowEnabled=true -s directAccessGrantsEnabled=false \
                  -s 'redirectUris=["'"$BITBUCKET_REDIRECT_URI"'"]' \
                  -s 'webOrigins=["+"]'
                BITBUCKET_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$BITBUCKET_CLIENT_ID" --fields id --format csv --noquotes | tail -1)
                echo "  created ($BITBUCKET_UUID)."
              else
                "$KCADM" update "clients/$BITBUCKET_UUID" -r "$REALM" \
                  -s 'redirectUris=["'"$BITBUCKET_REDIRECT_URI"'"]'
                echo "  already exists ($BITBUCKET_UUID), redirectUris refreshed."
              fi

              # Jira/Confluence/Bitbucket are intentionally excluded from the
              # groups-scope association loop below — those apps authorize
              # via their own LDAP user directory, not a Keycloak groups claim.
              echo "Ensuring 'groups' is an optional client scope on '$ARGOCD_CLIENT_ID', '$SONARQUBE_CLIENT_ID' and '$GRAFANA_CLIENT_ID'..."
              for CLIENT_ID_VAR in "$ARGOCD_CLIENT_ID" "$SONARQUBE_CLIENT_ID" "$GRAFANA_CLIENT_ID"; do
                CLIENT_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CLIENT_ID_VAR" --fields id --format csv --noquotes | tail -1)
                ALREADY_ASSOCIATED=$("$KCADM" get "clients/$CLIENT_UUID/optional-client-scopes" -r "$REALM" \
                  --fields name --format csv --noquotes 2>/dev/null | grep -c '^groups$' || true)
                if [ "$ALREADY_ASSOCIATED" = "0" ]; then
                  "$KCADM" update "clients/$CLIENT_UUID/optional-client-scopes/$GROUPS_SCOPE_ID" -r "$REALM" -b '{}'
                  echo "  associated groups scope with $CLIENT_ID_VAR."
                else
                  echo "  $CLIENT_ID_VAR already has groups scope."
                fi
              done
              echo "Done."
{{- end }}

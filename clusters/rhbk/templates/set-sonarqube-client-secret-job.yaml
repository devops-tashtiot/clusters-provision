# Sets the SonarQube client's real secret via the Keycloak Admin REST API,
# instead of putting it in the KeycloakRealmImport CR (realm-import.yaml)
# where it would have to be a literal value in a git-committed values file.
# Same pattern as set-client-secret-job.yaml (ArgoCD) — see that file's
# header comment for the full reasoning.
#
# Flow: SSM (/devtools/rhbk/sonarqube-client-secret, never in git) --
# ExternalSecret --> rhbk-sonarqube-client-secret k8s Secret (secrets.yaml) --
# this Job reads it and PUTs it onto the "sonarqube" client via kcadm.sh.
# SonarQube's own consumption of the SAME SSM parameter (via
# devtools-provision/devtools/sonarqube's OIDC secret template) is what
# actually gets the value into SonarQube's sonar.auth.oidc.clientSecret.secured
# — the two never share a literal value anywhere in git.
{{- if .Values.sonarqubeClient.secretSsmParameter }}
apiVersion: batch/v1
kind: Job
metadata:
  name: rhbk-set-sonarqube-client-secret
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: set-client-secret
          image: {{ .Values.keycloakImage | quote }}
          env:
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: rhbk-admin
                  key: username
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rhbk-admin
                  key: password
            - name: CLIENT_ID
              value: {{ .Values.sonarqubeClient.clientId | quote }}
            - name: REALM
              value: {{ .Values.realm.name | quote }}
            - name: DESIRED_SECRET
              valueFrom:
                secretKeyRef:
                  name: rhbk-sonarqube-client-secret
                  key: secret
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              KCADM=/opt/keycloak/bin/kcadm.sh
              SERVER="http://rhbk-service:8080"

              echo "Waiting for realm '$REALM' and client '$CLIENT_ID' to exist..."
              CLIENT_UUID=""
              for i in $(seq 1 60); do
                if "$KCADM" config credentials --server "$SERVER" --realm master \
                     --user "$KC_ADMIN_USER" --password "$KC_ADMIN_PASSWORD" >/dev/null 2>&1; then
                  CLIENT_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CLIENT_ID" \
                    --fields id --format csv --noquotes 2>/dev/null | tail -1 || true)
                  [ -n "$CLIENT_UUID" ] && break
                fi
                echo "  not ready yet, retrying in 5s"
                sleep 5
              done
              [ -n "$CLIENT_UUID" ] || { echo "client '$CLIENT_ID' in realm '$REALM' never appeared" >&2; exit 1; }

              echo "Setting secret for client $CLIENT_UUID"
              "$KCADM" update "clients/$CLIENT_UUID" -r "$REALM" -s "secret=$DESIRED_SECRET"
              echo "Done."
{{- end }}

# Sets the LDAP federation provider's real connectionUrl/bindDn/bindCredential
# via the Keycloak Admin REST API, instead of putting them in the
# KeycloakRealmImport CR (realm-import.yaml) where they'd have to be literal
# values in a git-committed values file.
#
# Flow: SSM (domain-controller's ldap_connection_url / ldap_bind_username_ssm_parameter /
# ldap_bind_password_ssm_parameter, never in git) -- ExternalSecret --> rhbk-ldap
# k8s Secret (ldap-secret.yaml) -- this Job reads it, derives the UPN-style
# bindDn ("<username>@<domain>", domain taken from ldap.usersDn's DC=
# components), and PATCHes the "active-directory" LDAP component via
# kcadm.sh. devtools-labs/terraform/modules/domain-controller writes the
# matching connectionUrl/AD account from the SAME SSM parameters — the two
# never share a literal value anywhere in git.
#
# A `post-install,post-upgrade` Helm hook with `before-hook-creation` means
# ArgoCD (which translates Helm hook annotations into its own sync hooks for
# Helm-sourced Applications) re-runs this on every sync, after the
# Keycloak/KeycloakRealmImport CRs above it are applied — so a credential (or
# private IP) rotation in SSM propagates on the next sync without a manual
# step.
{{- if and .Values.ldap.connectionUrlSsmParameter .Values.ldapBind.usernameSsmParameter .Values.ldapBind.passwordSsmParameter }}
apiVersion: batch/v1
kind: Job
metadata:
  name: rhbk-set-ldap-credentials
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: set-ldap-credentials
          image: {{ .Values.keycloakImage | quote }}
          env:
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: rhbk-admin
                  key: username
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rhbk-admin
                  key: password
            - name: REALM
              value: {{ .Values.realm.name | quote }}
            - name: USERS_DN
              value: {{ .Values.ldap.usersDn | quote }}
            - name: CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: rhbk-ldap
                  key: connectionUrl
            - name: BIND_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rhbk-ldap
                  key: username
            - name: BIND_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rhbk-ldap
                  key: password
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              KCADM=/opt/keycloak/bin/kcadm.sh
              SERVER="http://rhbk-service:8080"

              # "OU=devops-tashtiot,DC=devtools,DC=local" -> "devtools.local"
              DOMAIN_SUFFIX=$(echo "$USERS_DN" | grep -o 'DC=[^,]*' | sed 's/DC=//' | paste -sd. -)
              BIND_DN="${BIND_USERNAME}@${DOMAIN_SUFFIX}"

              echo "Waiting for realm '$REALM' and the active-directory LDAP provider to exist..."
              COMPONENT_ID=""
              for i in $(seq 1 60); do
                if "$KCADM" config credentials --server "$SERVER" --realm master \
                     --user "$KC_ADMIN_USER" --password "$KC_ADMIN_PASSWORD" >/dev/null 2>&1; then
                  COMPONENT_ID=$("$KCADM" get components -r "$REALM" -q name=active-directory \
                    --fields id --format csv --noquotes 2>/dev/null | tail -1 || true)
                  [ -n "$COMPONENT_ID" ] && break
                fi
                echo "  not ready yet, retrying in 5s"
                sleep 5
              done
              [ -n "$COMPONENT_ID" ] || { echo "active-directory LDAP provider in realm '$REALM' never appeared" >&2; exit 1; }

              echo "Setting connectionUrl/bindDn/bindCredential for LDAP provider $COMPONENT_ID"
              "$KCADM" update "components/$COMPONENT_ID" -r "$REALM" \
                -s "config.connectionUrl=[\"$CONNECTION_URL\"]" \
                -s "config.bindDn=[\"$BIND_DN\"]" \
                -s "config.bindCredential=[\"$BIND_PASSWORD\"]"
              echo "Done."
{{- end }}

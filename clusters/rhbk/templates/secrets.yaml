# Low-privilege Postgres role this chart's own initContainer creates on the
# shared RDS instance (see keycloak.yaml's unsupported.podTemplate). Fixed
# lab-shared credentials, matching the bitbucket/confluence pattern.
apiVersion: v1
kind: Secret
metadata:
  name: rhbk-db
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ .Values.dbSecrets.username | quote }}
  password: {{ .Values.dbSecrets.password | quote }}
---
# Keycloak's bootstrap admin user (spec.bootstrapAdmin.user.secret on the
# Keycloak CR requires a Secret with username/password keys). Username is
# plain (non-secret); password is pulled from the platform-wide shared
# admin-password SSM parameter, same as every other devtool.
apiVersion: v1
kind: Secret
metadata:
  name: rhbk-admin
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  username: {{ .Values.adminUsername | quote }}
  password: "changeme-placeholder" # patched by the ExternalSecret below when adminPasswordSsmParameter is set
---
{{- if .Values.adminPasswordSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rhbk-admin-password
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: rhbk-admin
    creationPolicy: Merge
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.adminPasswordSsmParameter | quote }}
{{- end }}
---
# The desired ArgoCD client secret, synced from SSM — never committed to
# git. Consumed by set-client-secret-job.yaml, which pushes this value into
# Keycloak via the Admin API (see that template's header comment for why).
{{- if .Values.argocdClient.secretSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rhbk-argocd-client-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: rhbk-argocd-client-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: {{ .Values.argocdClient.secretSsmParameter | quote }}
{{- end }}
---
# The desired SonarQube client secret, synced from SSM — never committed to
# git. Consumed by set-sonarqube-client-secret-job.yaml, which pushes this
# value into Keycloak via the Admin API, same pattern as ArgoCD's client
# secret above.
{{- if .Values.sonarqubeClient.secretSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rhbk-sonarqube-client-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: rhbk-sonarqube-client-secret
    creationPolicy: Owner
  data:
    - secretKey: secret
      remoteRef:
        key: {{ .Values.sonarqubeClient.secretSsmParameter | quote }}
{{- end }}

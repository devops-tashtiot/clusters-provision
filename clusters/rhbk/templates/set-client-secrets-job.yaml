# Sets the same shared OIDC client secret on all six clients (argocd,
# sonarqube, grafana, jira, confluence, bitbucket) via the Keycloak Admin REST API,
# instead of putting it in the KeycloakRealmImport CR (realm-import.yaml)
# where it would have to be a literal value in a git-committed values file.
#
# One shared secret for every client, rather than a distinct secret per
# client: nothing here calls for independent rotation/scoping per app, so a
# single value is simpler to manage — same reasoning as
# adminPasswordSsmParameter/dbSecrets already being shared platform-wide.
#
# Flow: SSM (sharedClientSecretSsmParameter, never in git) -- ExternalSecret
# --> rhbk-client-secret k8s Secret (secrets.yaml) -- this Job reads it and
# PUTs it onto every client via kcadm.sh. Each app's own consumption of the
# SAME SSM parameter (via devtools-provision/devtools/<tool>'s own OIDC
# secret template) is what actually gets the value into that app's OIDC
# client secret field — the two never share a literal value anywhere in git.
#
# A `post-install,post-upgrade` Helm hook with `before-hook-creation` means
# ArgoCD (which translates Helm hook annotations into its own sync hooks for
# Helm-sourced Applications) re-runs this on every sync, after the
# Keycloak/KeycloakRealmImport CRs and provision-oidc-clients-job.yaml above
# it are applied — so a secret rotation in SSM propagates on the next sync
# without a manual step.
{{- if .Values.sharedClientSecretSsmParameter }}
apiVersion: batch/v1
kind: Job
metadata:
  name: rhbk-set-client-secrets
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: set-client-secrets
          image: {{ .Values.keycloakImage | quote }}
          env:
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: rhbk-admin
                  key: username
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rhbk-admin
                  key: password
            - name: REALM
              value: {{ .Values.realm.name | quote }}
            - name: ARGOCD_CLIENT_ID
              value: {{ .Values.argocdClient.clientId | quote }}
            - name: SONARQUBE_CLIENT_ID
              value: {{ .Values.sonarqubeClient.clientId | quote }}
            - name: GRAFANA_CLIENT_ID
              value: {{ .Values.grafanaClient.clientId | quote }}
            - name: JIRA_CLIENT_ID
              value: {{ .Values.jiraClient.clientId | quote }}
            - name: CONFLUENCE_CLIENT_ID
              value: {{ .Values.confluenceClient.clientId | quote }}
            - name: BITBUCKET_CLIENT_ID
              value: {{ .Values.bitbucketClient.clientId | quote }}
            - name: DESIRED_SECRET
              valueFrom:
                secretKeyRef:
                  name: rhbk-client-secret
                  key: secret
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              KCADM=/opt/keycloak/bin/kcadm.sh
              SERVER="http://rhbk-service:8080"

              echo "Waiting for realm '$REALM' to exist..."
              for i in $(seq 1 60); do
                if "$KCADM" config credentials --server "$SERVER" --realm master \
                     --user "$KC_ADMIN_USER" --password "$KC_ADMIN_PASSWORD" >/dev/null 2>&1; then
                  "$KCADM" get "realms/$REALM" >/dev/null 2>&1 && break
                fi
                echo "  not ready yet, retrying in 5s"
                sleep 5
              done

              for CLIENT_ID_VAR in "$ARGOCD_CLIENT_ID" "$SONARQUBE_CLIENT_ID" "$GRAFANA_CLIENT_ID" "$JIRA_CLIENT_ID" "$CONFLUENCE_CLIENT_ID" "$BITBUCKET_CLIENT_ID"; do
                echo "Waiting for client '$CLIENT_ID_VAR' to exist..."
                CLIENT_UUID=""
                for i in $(seq 1 60); do
                  CLIENT_UUID=$("$KCADM" get clients -r "$REALM" -q clientId="$CLIENT_ID_VAR" \
                    --fields id --format csv --noquotes 2>/dev/null | tail -1 || true)
                  [ -n "$CLIENT_UUID" ] && break
                  echo "  not ready yet, retrying in 5s"
                  sleep 5
                done
                [ -n "$CLIENT_UUID" ] || { echo "client '$CLIENT_ID_VAR' in realm '$REALM' never appeared" >&2; exit 1; }

                echo "Setting secret for client $CLIENT_ID_VAR ($CLIENT_UUID)"
                "$KCADM" update "clients/$CLIENT_UUID" -r "$REALM" -s "secret=$DESIRED_SECRET"
              done
              echo "Done."
{{- end }}

# Declarative realm: the ArgoCD OIDC client + the AD/LDAP user federation
# provider, both expressed inline in the RealmRepresentation the Operator's
# KeycloakRealmImport controller applies via the Admin REST API. This is the
# modern Keycloak Operator's equivalent of separate Client/LDAP-federation
# CRDs — the actively maintained k8s.keycloak.org/v2alpha1 API only ships
# `Keycloak` and `KeycloakRealmImport` kinds; the older operator with
# distinct KeycloakClient/KeycloakRealm/KeycloakUser CRDs has been
# deprecated for years and doesn't support current Keycloak versions.
# Client/LDAP-federation are still fully declarative here — just nested
# inside one CR's realm spec instead of split across several CRs.
apiVersion: k8s.keycloak.org/v2alpha1
kind: KeycloakRealmImport
metadata:
  name: rhbk-devtools-realm
  namespace: {{ .Release.Namespace }}
spec:
  keycloakCRName: rhbk
  realm:
    realm: {{ .Values.realm.name | quote }}
    enabled: true
    sslRequired: none # TLS terminates at Cloudflare, not in-cluster

    userFederationProviders:
      - displayName: "active-directory"
        providerName: "ldap"
        priority: 0
        fullSyncPeriod: -1
        changedSyncPeriod: -1
        lastSync: 0
        config:
          vendor: "ad"
          usersDn: {{ .Values.ldap.usersDn | quote }}
          # Placeholders — templates/set-ldap-credentials-job.yaml patches the
          # real values onto this component via the Admin REST API after
          # creation (see that Job's header comment for why).
          connectionUrl: "ldap://placeholder:389"
          bindDn: "placeholder"
          bindCredential: "placeholder"
          usernameLDAPAttribute: "sAMAccountName"
          rdnLDAPAttribute: "cn"
          uuidLDAPAttribute: "objectGUID"
          userObjectClasses: "person, organizationalPerson, user"
          authType: "simple"
          editMode: "READ_ONLY"
          syncRegistrations: "false"
          pagination: "true"
          connectionPooling: "true"

    # Optional (not default) client scope carrying AD group membership as a
    # "groups" claim — populated by the group-ldap-mapper
    # templates/set-ldap-credentials-job.yaml adds to the LDAP federation
    # provider. Optional rather than default so it doesn't touch Keycloak's
    # built-in default-scope set for every client; each client below opts in
    # via optionalClientScopes, and the OIDC client (ArgoCD's oidc.config,
    # SonarQube's sonar.auth.oidc.scopes) must actually request "groups" for
    # it to appear in the issued token.
    clientScopes:
      - name: "groups"
        protocol: "openid-connect"
        description: "AD group membership, for RBAC/admin-group mapping in downstream apps"
        protocolMappers:
          - name: "groups"
            protocol: "openid-connect"
            protocolMapper: "oidc-group-membership-mapper"
            config:
              "claim.name": "groups"
              "full.path": "false"
              "id.token.claim": "true"
              "access.token.claim": "true"
              "userinfo.token.claim": "true"
      # Client scope requested only by devops-api's argocdServiceClient (client_credentials,
      # for devops-api's outbound calls to ArgoCD's own API) — carries two things a real human
      # OIDC login gets for free but a service account has neither of on its own:
      # 1. An Audience mapper so the token's `aud` includes ArgoCD's own OIDC clientID
      #    (argocd) — ArgoCD's oidc.config validates the token's audience against exactly
      #    this, and a plain client_credentials token's default audience ("account") fails
      #    that check (confirmed live).
      # 2. A hardcoded "groups" claim — a service account has no real AD group membership for
      #    ArgoCD's group-based RBAC (policy.csv) to key off of the way a real human login
      #    does, so this stamps a synthetic group value instead. devtools-definition's
      #    devops-tashtiot argocd policy.csv binds a scoped-down role to this exact group name
      #    (NOT role:admin) — keep the two in sync if this value ever changes.
      - name: "devops-api-argocd-audience"
        protocol: "openid-connect"
        description: "Marks a token as intended for ArgoCD's API (aud claim) and carries the synthetic RBAC group devops-api's outbound ArgoCD calls authenticate as"
        protocolMappers:
          - name: "argocd-audience"
            protocol: "openid-connect"
            protocolMapper: "oidc-audience-mapper"
            config:
              "included.client.audience": {{ .Values.argocdClient.clientId | quote }}
              "id.token.claim": "false"
              "access.token.claim": "true"
          - name: "devops-api-argocd-groups"
            protocol: "openid-connect"
            protocolMapper: "oidc-hardcoded-claim-mapper"
            config:
              "claim.name": "groups"
              "claim.value": "[\"devops-api-argocd-svc\"]"
              "jsonType.label": "JSON"
              "id.token.claim": "false"
              "access.token.claim": "true"
              "userinfo.token.claim": "false"

    clients:
      - clientId: {{ .Values.argocdClient.clientId | quote }}
        name: "ArgoCD"
        enabled: true
        protocol: "openid-connect"
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        redirectUris:
          - {{ .Values.argocdClient.redirectUri | quote }}
        webOrigins:
          - "+"
        optionalClientScopes:
          - "groups"
        # No secret here deliberately — Keycloak assigns a random one on
        # creation, then set-client-secrets-job.yaml overwrites it with the
        # shared real value via the Admin API. See that template's header
        # comment.
      - clientId: {{ .Values.sonarqubeClient.clientId | quote }}
        name: "SonarQube"
        enabled: true
        protocol: "openid-connect"
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        redirectUris:
          - {{ .Values.sonarqubeClient.redirectUri | quote }}
        webOrigins:
          - "+"
        optionalClientScopes:
          - "groups"
        # No secret here deliberately — same reasoning as ArgoCD's client
        # above; set-client-secrets-job.yaml sets the shared real value.
      - clientId: {{ .Values.grafanaClient.clientId | quote }}
        name: "Grafana"
        enabled: true
        protocol: "openid-connect"
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        redirectUris:
          - {{ .Values.grafanaClient.redirectUri | quote }}
        webOrigins:
          - "+"
        optionalClientScopes:
          - "groups"
        # No secret here deliberately — same reasoning as ArgoCD's client
        # above; set-client-secrets-job.yaml sets the shared real value.
      - clientId: {{ .Values.jiraClient.clientId | quote }}
        name: "Jira"
        enabled: true
        protocol: "openid-connect"
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        redirectUris:
          - {{ .Values.jiraClient.redirectUri | quote }}
        webOrigins:
          - "+"
        # No "groups" optionalClientScope — Jira uses its own LDAP user
        # directory for authorization, not Keycloak group-membership claims.
        # No secret here deliberately — same reasoning as ArgoCD's client
        # above; set-client-secrets-job.yaml sets the shared real value.
      - clientId: {{ .Values.confluenceClient.clientId | quote }}
        name: "Confluence"
        enabled: true
        protocol: "openid-connect"
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        redirectUris:
          - {{ .Values.confluenceClient.redirectUri | quote }}
        webOrigins:
          - "+"
        # No "groups" optionalClientScope — same reasoning as Jira's client
        # above.
        # No secret here deliberately — same reasoning as ArgoCD's client
        # above; set-client-secrets-job.yaml sets the shared real value.
      - clientId: {{ .Values.argocdServiceClient.clientId | quote }}
        name: "devops-api ArgoCD service account"
        enabled: true
        protocol: "openid-connect"
        publicClient: false
        standardFlowEnabled: false
        directAccessGrantsEnabled: false
        serviceAccountsEnabled: true
        optionalClientScopes:
          - "devops-api-argocd-audience"
        # Same shared-secret convention as the browser-login clients above (set-client-secrets-job.yaml) —
        # authenticates as itself via client_credentials to call ArgoCD's own API on
        # devops-api's behalf. See values.yaml's argocdServiceClient comment for the full
        # rationale (why a dedicated client instead of reusing "argocd"'s own service account).
      - clientId: {{ .Values.bitbucketClient.clientId | quote }}
        name: "Bitbucket"
        enabled: true
        protocol: "openid-connect"
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        redirectUris:
          - {{ .Values.bitbucketClient.redirectUri | quote }}
        webOrigins:
          - "+"
        # No "groups" optionalClientScope — same reasoning as Jira's client
        # above.
        # No secret here deliberately — same reasoning as ArgoCD's client
        # above; set-client-secrets-job.yaml sets the shared real value.
      - clientId: {{ .Values.artifactoryClient.clientId | quote }}
        name: "Artifactory"
        enabled: true
        protocol: "openid-connect"
        publicClient: false
        standardFlowEnabled: true
        directAccessGrantsEnabled: false
        redirectUris:
          - {{ .Values.artifactoryClient.redirectUri | quote }}
        webOrigins:
          - "+"
        # No "groups" optionalClientScope — same reasoning as Jira's client
        # above.
        # No secret here deliberately — same reasoning as ArgoCD's client
        # above; set-client-secrets-job.yaml sets the shared real value.

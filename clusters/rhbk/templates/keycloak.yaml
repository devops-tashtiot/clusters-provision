# The actual Keycloak server instance, reconciled by the Operator installed
# in operator.yaml. Two initContainers do the two pieces of pre-work the
# main container needs:
#   1. ensure-postgres-db — provisions this chart's own low-priv role/database
#      on the shared devtools-rds instance (see add-devtool skill section 5;
#      same script shape as bitbucket/confluence's additionalInitContainers).
#   2. wait-for-domain-controller — polls the AD domain controller's LDAP
#      port until reachable, so this pod's own readiness (and therefore the
#      "rhbk" Application's Healthy status that devtools-labs' minikube
#      user_data waits on) reflects real AD availability instead of racing
#      it. Modeled at the k8s layer deliberately — see clusters-provision
#      README note: a Terraform dependency here would need to go
#      domain-controller -> minikube, which is backwards (minikube's SG
#      already flows the other way) and Terraform has no visibility into
#      when Windows finishes promoting the forest anyway.
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: rhbk
  namespace: {{ .Release.Namespace }}
spec:
  instances: {{ .Values.instances }}

  db:
    vendor: postgres
    host: {{ .Values.rds.host | quote }}
    port: {{ .Values.rds.port }}
    database: {{ .Values.rds.database | quote }}
    usernameSecret:
      name: rhbk-db
      key: username
    passwordSecret:
      name: rhbk-db
      key: password

  http:
    httpEnabled: true
  proxy:
    headers: xforwarded

  hostname:
    hostname: {{ .Values.ingress.host | quote }}

  # We route through nginx-ingress + cloudflared like every other devtool
  # (see templates/ingress.yaml) rather than the Operator's own basic ingress.
  ingress:
    enabled: false

  # minikube's docker driver has no real CNI enforcing NetworkPolicy; leaving
  # the Operator's default (enabled: true) on would add inert objects that
  # look like a security boundary but aren't one here.
  networkPolicy:
    enabled: false

  bootstrapAdmin:
    user:
      secret: rhbk-admin

  resources:
    {{- toYaml .Values.resources | nindent 4 }}

  unsupported:
    podTemplate:
      spec:
        initContainers:
          - name: ensure-postgres-db
            image: postgres:17-alpine
            env:
              - name: PGHOST
                value: {{ .Values.rds.host | quote }}
              - name: PGPORT
                value: {{ .Values.rds.port | quote }}
              - name: ADMIN_USER
                valueFrom:
                  secretKeyRef:
                    name: rds-admin-credentials
                    key: username
              - name: PGPASSWORD
                valueFrom:
                  secretKeyRef:
                    name: rds-admin-credentials
                    key: password
              - name: APP_DB_NAME
                value: {{ .Values.rds.database | quote }}
              - name: APP_DB_USER
                valueFrom:
                  secretKeyRef:
                    name: rhbk-db
                    key: username
              - name: APP_DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: rhbk-db
                    key: password
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
                  "SELECT 1 FROM pg_roles WHERE rolname = '$APP_DB_USER'" | grep -q 1 || \
                psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
                  "CREATE ROLE \"$APP_DB_USER\" LOGIN PASSWORD '$APP_DB_PASSWORD';"
                psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
                  "ALTER ROLE \"$APP_DB_USER\" WITH PASSWORD '$APP_DB_PASSWORD';"
                psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -tAc \
                  "SELECT 1 FROM pg_database WHERE datname = '$APP_DB_NAME'" | grep -q 1 || \
                psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
                  "CREATE DATABASE \"$APP_DB_NAME\" OWNER \"$APP_DB_USER\";"
                psql -h "$PGHOST" -p "$PGPORT" -U "$ADMIN_USER" -d postgres -v ON_ERROR_STOP=1 -c \
                  "GRANT ALL PRIVILEGES ON DATABASE \"$APP_DB_NAME\" TO \"$APP_DB_USER\";"
          - name: wait-for-domain-controller
            image: busybox:1.36
            env:
              - name: LDAP_HOST
                value: {{ .Values.ldap.connectionUrl | trimPrefix "ldap://" | trimSuffix "/" | quote }}
            command:
              - /bin/sh
              - -c
              - |
                set -eu
                host="${LDAP_HOST%%:*}"
                port="${LDAP_HOST##*:}"
                echo "Waiting for domain controller LDAP at $host:$port ..."
                until nc -z -w2 "$host" "$port"; do
                  echo "  not reachable yet, retrying in 5s"
                  sleep 5
                done
                echo "Domain controller LDAP is reachable."

# The domain controller's real LDAP connection URL and bind service account
# username/password, synced from SSM — never committed to git. Consumed by:
#   - keycloak.yaml's wait-for-domain-controller initContainer (connectionUrl)
#   - set-ldap-credentials-job.yaml, which pushes all three values into
#     Keycloak's LDAP federation provider via the Admin API (see that
#     template's header comment for why)
{{- if and .Values.ldap.connectionUrlSsmParameter .Values.ldapBind.usernameSsmParameter .Values.ldapBind.passwordSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rhbk-ldap
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: rhbk-ldap
    creationPolicy: Owner
  data:
    - secretKey: connectionUrl
      remoteRef:
        key: {{ .Values.ldap.connectionUrlSsmParameter | quote }}
    - secretKey: username
      remoteRef:
        key: {{ .Values.ldapBind.usernameSsmParameter | quote }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.ldapBind.passwordSsmParameter | quote }}
{{- end }}

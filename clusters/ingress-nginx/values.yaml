# Base values — ClusterIP only, no AWS load balancer needed.
# cloudflared (see devtools/cloudflared) dials out to Cloudflare and forwards
# traffic to this controller; it routes onward by Host header.

ingress-nginx:
  controller:
    service:
      type: ClusterIP
    config:
      # cloudflared connects to this controller over plain HTTP (TLS terminates
      # at Cloudflare), so by default nginx overwrites X-Forwarded-Proto with
      # its own (http) connection scheme on every request, discarding
      # Cloudflare's real https signal. Devtools behind ingress.https: true
      # (Bitbucket, etc.) trust that per-request header for scheme detection —
      # seeing http unconditionally breaks XSRF double-submit checks that
      # compare it against the browser's Origin/Referer. Trusting forwarded
      # headers here makes nginx pass through what it actually received
      # instead of substituting its own scheme.
      use-forwarded-headers: "true"
      # With use-forwarded-headers on, nginx's X-Forwarded-Port now comes from
      # $pass_port, which falls back to nginx's own listening port (80, since
      # cloudflared connects over plain HTTP) whenever there's no incoming
      # X-Forwarded-Port to trust — Cloudflare doesn't send one. Devtools that
      # honor forwarded headers (Bitbucket, etc.) then build redirect/absolute
      # URLs with :80 appended (non-standard for https), even though
      # SERVER_PROXY_PORT=443 is configured, because the per-request header
      # wins. Every request on this platform is actually reached via
      # Cloudflare on 443, so force that unconditionally at the location
      # level (location-snippet directives override the templated
      # proxy_set_header for the same header name within the same location).
      location-snippet: |
        proxy_set_header X-Forwarded-Port 443;
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# Base values — ClusterIP only, no AWS load balancer needed.
# cloudflared (see devtools/cloudflared) dials out to Cloudflare and connects
# to this controller over real HTTPS using a Cloudflare Origin Certificate
# (see origin-cert-secret.yaml / clusters-definition's override for the SSM
# paths + the default-ssl-certificate extraArg), routing onward by Host header.
#
# Earlier attempts fixed the scheme/port mismatch by trusting forwarded
# headers (`use-forwarded-headers`) plus a `location-snippet` forcing
# X-Forwarded-Port to 443. That approach never fully worked: nginx-ingress's
# per-location `set $pass_port ...`/`proxy_set_header X-Forwarded-Port
# $pass_port` pair always executes before any location-snippet content can
# run (snippets are appended at the end of the location block), so nothing
# injectable via ConfigMap could actually override what that unconditional
# pair sends — confirmed with a raw echo-server backend across several
# variants (duplicate proxy_set_header, re-`set`-ing the variable,
# more_set_input_headers). The real fix is architectural: once cloudflared
# genuinely connects over HTTPS on 443, nginx's own $scheme/$server_port are
# correct natively for every devtool, with no per-location workaround needed.
ingress-nginx:
  controller:
    service:
      type: ClusterIP
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # TCP passthrough — ingress-nginx only routes HTTP(S) by Host header; raw TCP protocols
  # need this separate mechanism (a ConfigMap the controller reads, standard ingress-nginx
  # feature, not an ingress-nginx-specific hack). Currently just Bitbucket's SSH mirroring
  # port. devops-api's Git connector (tashtiot-apis-library's Git.delete_file) builds
  # ssh://git@bitbucket.devopstashtiot.page:7995/... — that hostname resolves in-cluster
  # to this same ingress-nginx-controller (see kube-system/coredns's rewrite rules,
  # documented in devops-api/app/v1/argocd/CLAUDE.md), which had no listener on 7995 at
  # all, so the connection just hung until timeout rather than failing fast. 7995 is also
  # not Bitbucket's real SSH port (7999, confirmed via `kubectl get svc -n bitbucket`) —
  # the library hardcodes 7995 with no way to override it.
  #
  # TEMPORARY — remove once Platform-Infra-Org/apis-library merges an ssh_port override
  # (tracking: https://github.com/Platform-Infra-Org/apis-library/pull/12)
  # and devops-api bumps to a version with it, configured to the real port 7999 directly.
  # At that point this 7995->7999 translation shim serves no purpose — don't leave it lying
  # around as a redundant hop once the actual bug is fixed at the source.
  tcp:
    "7995": "bitbucket/bitbucket:7999"

# Values consumed only by this umbrella chart's own templates/ (not passed to
# the ingress-nginx subchart) — kept under "wrapper" so they never collide
# with the ingress-nginx subchart's own top-level key above.
wrapper:
  # SSM Parameter Store paths (SecureString) holding the Cloudflare Origin
  # Certificate (wildcard *.devopstashtiot.page) used as this controller's
  # default TLS cert — see origin-cert-secret.yaml. Left empty here; set per
  # environment in clusters-definition (along with the matching
  # controller.extraArgs.default-ssl-certificate override), same pattern as
  # rhbk's ldap.*SsmParameter values.
  originCert:
    crtSsmParameter: ""
    keySsmParameter: ""

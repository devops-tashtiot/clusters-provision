# Cloudflare Origin Certificate (wildcard *.devopstashtiot.page / apex),
# installed as this controller's cluster-wide default TLS cert
# (controller.extraArgs.default-ssl-certificate, set per environment in
# clusters-definition) so cloudflared can connect to it over real HTTPS
# instead of plain HTTP — see values.yaml's header comment for why that
# matters (fixes X-Forwarded-Port/Proto for every devtool at the root cause
# instead of fighting nginx's per-location directive ordering).
#
# Generated via Cloudflare Dashboard > SSL/TLS > Origin Server > Create
# Certificate (15-year validity) — not via the Origin CA API, which needs a
# separate "Origin CA Key" credential distinct from the Global API Key this
# project otherwise uses (see parent CLAUDE.md). Cloudflared's originRequest
# must set originServerName to a host covered by this cert's SAN, since it
# connects to the ingress-nginx-controller Service's cluster-DNS name (which
# the cert doesn't cover) — see clusters/cloudflared/values.yaml.
{{- if .Values.wrapper.originCert.crtSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ingress-nginx-origin-cert
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: ingress-nginx-origin-cert
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: {{ .Values.wrapper.originCert.crtSsmParameter | quote }}
    - secretKey: tls.key
      remoteRef:
        key: {{ .Values.wrapper.originCert.keySsmParameter | quote }}
{{- end }}

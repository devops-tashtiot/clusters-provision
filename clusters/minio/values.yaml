# Base values — same across every environment. The admin SSM parameter
# path (env-specific) lives in clusters-definition/clusters/minio/values.yaml
# instead.

# Admin console login (rootUser/rootPassword via templates/admin-secret.yaml
# -> minio.existingSecret below). Username is plain; password is the
# platform-wide shared admin-password SSM parameter — same convention as
# every other devtool/cluster-infra tool, never a per-tool credential.
adminUsername: "admin"
adminPasswordSsmParameter: "" # set in clusters-definition

minio:
  # Single-node cluster — distributed mode's default 16 replicas (multi-node
  # multi-drive) makes no sense on this platform's one minikube instance.
  mode: standalone
  replicas: 1

  # See templates/admin-secret.yaml — rootUser/rootPassword come from that
  # Secret instead of the chart auto-generating its own.
  existingSecret: "minio-admin"

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

  persistence:
    enabled: true
    storageClassName: gp2
    size: 5Gi

  service:
    type: ClusterIP
    port: "9000"

  consoleService:
    type: ClusterIP
    port: "9001"

  # devops-api itself still reaches this over in-cluster Service DNS
  # (minio.minio.svc.cluster.local:9000), never through the Cloudflare
  # Tunnel/Access (see devtools-definition/devtools/devops-api/values.yaml
  # for why every other tool devops-api calls was moved to Service DNS too).
  # The Console (human browser access, not devops-api) is exposed publicly
  # at minio.devopstashtiot.page like every other tool's UI — https: false,
  # TLS terminates at Cloudflare. The S3 API itself stays ClusterIP-only
  # (ingress.enabled: false) since nothing external needs to reach it.
  ingress:
    enabled: false
  consoleIngress:
    enabled: true
    ingressClassName: nginx
    path: /
    hosts:
      - minio.devopstashtiot.page
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"

  # "public" == anonymous GetObject *and* PutObject (MinIO's `mc anonymous
  # set public` policy) — matches the local dev docker-compose MinIO stack's
  # public-read/write buckets, so devops-api's existing httpx-based
  # fetch/upload code (app/helpers.py's fetch_from_s3, confluence/
  # operations.py's upload_plugin_to_s3/upload_archive_to_s3) keeps working
  # completely unchanged, just pointed at this bucket's in-cluster URL
  # instead of localhost. Subfolders (confluence-plugins/,
  # confluence-space-imports/, xray-vulnerability-updates/) aren't
  # pre-created — MinIO doesn't need a real "folder" object for a key
  # prefix to work, callers just include the prefix in the object key.
  buckets:
    - name: platform-clients
      policy: public
      purge: false
    - name: platform-devops-team
      policy: public
      purge: false

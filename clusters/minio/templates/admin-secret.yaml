# MinIO's rootUser/rootPassword (chart's existingSecret — see
# charts/minio/values.yaml's "Use existing Secret" section, keys rootUser/
# rootPassword). Username is plain (non-secret); password comes from the
# platform-wide shared admin-password SSM parameter, same as every other
# devtool/cluster-infra tool (rhbk, bitbucket, artifactory, ...) — never a
# separate per-tool admin password parameter.
apiVersion: v1
kind: Secret
metadata:
  name: minio-admin
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  rootUser: {{ .Values.adminUsername | quote }}
  rootPassword: "changeme-placeholder" # patched by the ExternalSecret below when adminPasswordSsmParameter is set
---
{{- if .Values.adminPasswordSsmParameter }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-admin-password
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: minio-admin
    creationPolicy: Merge
  data:
    - secretKey: rootPassword
      remoteRef:
        key: {{ .Values.adminPasswordSsmParameter | quote }}
{{- end }}

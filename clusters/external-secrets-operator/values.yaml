# Values that are the same across every environment.
# AWS region/credentials for the ClusterSecretStore are environment-specific
# and live in devtools-definition/devtools/external-secrets-operator/values.yaml.

external-secrets:
  installCRDs: true
  replicaCount: 1

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  webhook:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  certController:
    replicaCount: 1
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  # Enables ExternalSecret's spec.target.manifest field ("generic targets") — needed by
  # devtools-provision/devtools/argocd/templates/trusted-certs.yaml, which creates a ConfigMap
  # (argocd-tls-certs-cm) directly from an ExternalSecret instead of the usual Secret, since
  # ArgoCD's repo-server reads trusted git-clone certs from a ConfigMap, not a Secret — the
  # normal ExternalSecret target type. Disabled by default upstream (renders
  # --unsafe-allow-generic-targets=true) because it grants the controller create/update/delete
  # on ConfigMaps cluster-wide, not just Secrets — a materially bigger permission surface, hence
  # the "unsafe" naming. Only ConfigMap permissions are granted (the base kind this flag always
  # covers); no genericTargets.resources entries are added since nothing else needs it yet.
  genericTargets:
    enabled: true

# Values consumed only by this umbrella chart's own templates/ (not passed to
# the external-secrets subchart) — kept under "wrapper" so they never collide
# with the external-secrets subchart's own top-level key above.
#
# Rendered by this umbrella chart's own templates/ (not the subchart) —
# gives every namespace a shared AWS Parameter Store backend with no
# static credentials: ESO's pod picks up the minikube EC2 instance's IAM
# role via IMDS (the instance's http_put_response_hop_limit=2 setting
# exists specifically so a containerized process can reach it).
wrapper:
  awsParameterStore:
    region: "" # set in clusters-definition
